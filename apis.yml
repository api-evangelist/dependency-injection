name: Dependency Injection
description: A design pattern in which objects receive their dependencies from external
  sources rather than creating them internally, promoting loose coupling and easier
  testing. Effective use of this practice reduces bugs in production and supports
  a culture of quality-driven development.
url: https://en.wikipedia.org/wiki/Dependency_injection
